<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — WeThePeople</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div class="header-left">
        <a class="site-title" href="/">WeThePeople</a>
      </div>
    </header>

    <main style="max-width: 400px; margin: 80px auto; padding: 0 24px">
      <h1
        style="
          font-family: &quot;Playfair Display&quot;, serif;
          margin-bottom: 8px;
        "
      >
        Welcome back
      </h1>
      <p style="color: var(--text-muted); margin-bottom: 32px">
        Sign in to your account
      </p>

      <div
        id="error-msg"
        style="display: none; color: red; margin-bottom: 16px"
      ></div>

      <div style="display: flex; flex-direction: column; gap: 16px">
        <div>
          <label style="display: block; margin-bottom: 6px; font-weight: 500"
            >Username</label
          >
          <input
            id="username"
            type="text"
            placeholder="Enter your username"
            style="
              width: 100%;
              padding: 10px 14px;
              border: 1px solid var(--border);
              border-radius: 6px;
              font-size: 0.95rem;
              box-sizing: border-box;
            "
          />
        </div>
        <div>
          <label style="display: block; margin-bottom: 6px; font-weight: 500"
            >Password</label
          >
          <input
            id="password"
            type="password"
            placeholder="Enter your password"
            style="
              width: 100%;
              padding: 10px 14px;
              border: 1px solid var(--border);
              border-radius: 6px;
              font-size: 0.95rem;
              box-sizing: border-box;
            "
          />
        </div>
        <button
          onclick="login()"
          style="
            padding: 10px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
          "
        >
          Sign In
        </button>
      </div>

      <p style="margin-top: 24px; color: var(--text-muted); font-size: 0.9rem">
        Don't have an account? <a href="/register">Register</a>
      </p>
    </main>

    <script>
      async function login() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        const errorMsg = document.getElementById("error-msg");

        // OAuth2 requires form data, not JSON
        const formData = new URLSearchParams();
        formData.append("username", username);
        formData.append("password", password);

        try {
          const res = await fetch("/users/login", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: formData,
          });

          if (!res.ok) {
            errorMsg.style.display = "block";
            errorMsg.textContent = "Invalid username or password.";
            return;
          }

          const data = await res.json();
          localStorage.setItem("token", data.access_token);
          window.location.href = "/";
        } catch (err) {
          errorMsg.style.display = "block";
          errorMsg.textContent = "Something went wrong. Try again.";
        }
      }
    </script>
  </body>
</html>
