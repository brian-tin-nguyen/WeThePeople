<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Post — WeThePeople</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <div class="header-left">
        <button class="hamburger" aria-label="Menu">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
        <a class="site-title" href="/">WeThePeople</a>
      </div>

      <div class="header-center">
        <nav>
          <a href="/">Home</a>
          <a href="#">Articles</a>
          <a href="#">Technology</a>
          <a href="#">Programming</a>
          <a href="#">Lifestyle</a>
          <a href="#">Productivity</a>
          <a href="#">Health</a>
          <a href="#">Finance</a>
        </nav>
      </div>

      <div class="header-right">
        <button
          class="icon-btn"
          id="themeToggle"
          aria-label="Toggle theme"
          onclick="toggleTheme()"
        >
          <svg
            id="sunIcon"
            width="17"
            height="17"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
        </button>
        <button class="login-btn" onclick="logout()">Logout</button>
      </div>
    </header>

    <main style="max-width: 700px; margin: 60px auto; padding: 0 24px">
      <h1
        style="
          font-family: &quot;Playfair Display&quot;, serif;
          margin-bottom: 8px;
        "
      >
        Edit Post
      </h1>
      <p style="color: var(--text-muted); margin-bottom: 32px">
        Update your article
      </p>

      <div
        id="error-msg"
        style="display: none; color: red; margin-bottom: 16px"
      ></div>
      <div
        id="success-msg"
        style="display: none; color: green; margin-bottom: 16px"
      ></div>

      <div style="display: flex; flex-direction: column; gap: 16px">
        <div>
          <label style="display: block; margin-bottom: 6px; font-weight: 500"
            >Title</label
          >
          <input
            id="title"
            type="text"
            placeholder="Post title"
            style="
              width: 100%;
              padding: 10px 14px;
              border: 1px solid var(--border);
              border-radius: 6px;
              font-size: 0.95rem;
              box-sizing: border-box;
            "
          />
        </div>
        <div>
          <label style="display: block; margin-bottom: 6px; font-weight: 500"
            >Body</label
          >
          <textarea
            id="body"
            rows="10"
            placeholder="Write your post here..."
            style="
              width: 100%;
              padding: 10px 14px;
              border: 1px solid var(--border);
              border-radius: 6px;
              font-size: 0.95rem;
              box-sizing: border-box;
              resize: vertical;
            "
          ></textarea>
        </div>

        <div style="display: flex; gap: 10px">
          <button
            onclick="savePost()"
            style="
              flex: 1;
              padding: 10px;
              background: var(--accent);
              color: white;
              border: none;
              border-radius: 6px;
              font-weight: 600;
              font-size: 0.95rem;
              cursor: pointer;
            "
          >
            Save Changes
          </button>
          <button
            onclick="cancel()"
            style="
              padding: 10px 20px;
              background: transparent;
              border: 1px solid var(--border);
              border-radius: 6px;
              font-weight: 600;
              font-size: 0.95rem;
              cursor: pointer;
            "
          >
            Cancel
          </button>
        </div>
      </div>
    </main>

    <script>
      const token = localStorage.getItem("token");
      if (!token) window.location.href = "/login";

      function toggleTheme() {
        const html = document.documentElement;
        const isDark = html.getAttribute("data-theme") === "dark";
        html.setAttribute("data-theme", isDark ? "light" : "dark");
        document.getElementById("sunIcon").style.stroke = isDark
          ? "currentColor"
          : "#60a5fa";
      }

      function logout() {
        localStorage.removeItem("token");
        window.location.href = "/";
      }

      // Get post ID from URL — /edit/5 → 5
      function getPostId() {
        const parts = window.location.pathname.split("/");
        return parts[parts.length - 1];
      }

      const postId = getPostId();

      // ── Pre-fill the form with the existing post data ─────────────────
      // Fetches the current post and puts its title/body into the inputs
      // so the user edits what's already there instead of starting blank
      async function loadPost() {
        const res = await fetch(`/posts/${postId}`);
        if (!res.ok) {
          document.getElementById("error-msg").style.display = "block";
          document.getElementById("error-msg").textContent =
            "Could not load post.";
          return;
        }
        const post = await res.json();
        document.getElementById("title").value = post.title;
        document.getElementById("body").value = post.body || "";
      }

      // ── Save the updated post via PUT ─────────────────────────────────
      async function savePost() {
        const title = document.getElementById("title").value;
        const body = document.getElementById("body").value;
        const errorMsg = document.getElementById("error-msg");
        const successMsg = document.getElementById("success-msg");

        const res = await fetch(`/posts/${postId}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({ title, body }),
        });

        if (!res.ok) {
          errorMsg.style.display = "block";
          errorMsg.textContent = "Could not save. Are you the author?";
          return;
        }

        successMsg.style.display = "block";
        successMsg.textContent = "Saved! Redirecting...";
        setTimeout(() => (window.location.href = `/post/${postId}`), 1500);
      }

      // ── Cancel — go back to the post without saving ───────────────────
      function cancel() {
        window.location.href = `/post/${postId}`;
      }

      loadPost();
    </script>
  </body>
</html>
